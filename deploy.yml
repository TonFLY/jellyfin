name: Deploy Jellyfin

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: /opt/jellyfin
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
        run: |
          # Copiar arquivos de configuração para o VPS
          scp -o StrictHostKeyChecking=no docker-compose.yml $VPS_USER@$VPS_HOST:$DEPLOY_PATH/
          scp -o StrictHostKeyChecking=no Caddyfile $VPS_USER@$VPS_HOST:$DEPLOY_PATH/
          
          # Executar deploy no VPS
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "DEPLOY_PATH=$DEPLOY_PATH SSL_EMAIL=$SSL_EMAIL bash -s" <<'EOF'
          set -e
          cd "$DEPLOY_PATH"
          
          # Substituir placeholder do email no Caddyfile se fornecido
          if [ -n "$SSL_EMAIL" ]; then
            sed -i "s/EMAIL_SSL/$SSL_EMAIL/g" Caddyfile
          fi
          
          # Criar diretórios necessários (se não existirem)
          mkdir -p config cache caddy_data caddy_config
          
          # Pull das imagens mais recentes
          docker compose pull
          
          # Reiniciar containers
          docker compose up -d
          
          # Limpar imagens antigas
          docker image prune -f
          
          echo "✅ Deploy concluído!"
          docker compose ps
          EOF
